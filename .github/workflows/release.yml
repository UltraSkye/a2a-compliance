name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # Pre-flight: inspect what each tarball would actually contain.
      # Catches accidents like missing LICENSE, leaked tests, wrong file list —
      # before we get into irreversible publish calls.
      - name: Preflight — inspect tarball contents
        run: |
          set -e
          for pkg in schemas core cli; do
            echo "::group::@a2a-compliance/$pkg pack contents"
            (cd packages/$pkg && pnpm pack --pack-destination /tmp --dry-run)
            echo "::endgroup::"
          done
          # Hard fail if anyone's tarball forgot LICENSE.
          for pkg in schemas core cli; do
            pnpm --filter @a2a-compliance/$pkg pack --pack-destination /tmp > /tmp/pack.log
            tgz=$(ls /tmp/a2a-compliance-$pkg-*.tgz | head -1)
            if ! tar tzf "$tgz" | grep -q 'package/LICENSE'; then
              echo "::error::@a2a-compliance/$pkg tarball is missing LICENSE" && exit 1
            fi
            if tar tzf "$tgz" | grep -qE '\.test\.(js|d\.ts)$'; then
              echo "::error::@a2a-compliance/$pkg tarball contains test artefacts" && exit 1
            fi
          done

      # Publish each workspace package that has publishConfig.access=public.
      # --no-git-checks lets pnpm publish from a tag commit without fighting
      # the dirty check; --provenance attaches an npm provenance statement.
      - name: Publish @a2a-compliance/schemas
        run: pnpm --filter @a2a-compliance/schemas publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @a2a-compliance/core
        run: pnpm --filter @a2a-compliance/core publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @a2a-compliance/cli
        run: pnpm --filter @a2a-compliance/cli publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
