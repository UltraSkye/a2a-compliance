name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of its base branch so stacked PRs
  # (feat/v0.3-docker → feat/v0.2 → main, etc.) still get full CI
  # before they land. The default-branch-only form blocks feedback
  # on anything not retargeted to main.
  pull_request: {}
  # Weekly Trivy rescan catches newly-disclosed CVEs even when no PR lands.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  packages:
    name: packages / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # vitest 4 + rolldown require node:util.styleText, available from
        # Node 22.10. Drop 20.x from the matrix and lift engines.node to
        # match (done separately in each publishable package.json).
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too would fail with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # pnpm audit catches newly-disclosed CVEs in transitive deps on
      # every PR. --audit-level=moderate so low-severity advisories
      # surface in logs without failing the build.
      - run: pnpm audit --audit-level=moderate
      - run: pnpm lint
      # Build must come before typecheck: the core package consumes
      # @a2a-compliance/schemas via its compiled dist/*.d.ts, and tsc
      # --noEmit against an unbuilt workspace fails with TS2307.
      - run: pnpm build
      - run: pnpm typecheck
      # Web typecheck folded into the main job so regressions fail fast
      # in the Node-matrix run rather than the separate web job.
      - run: pnpm --filter @a2a-compliance/web typecheck
      - run: pnpm test
      # Coverage thresholds per package are pinned in each package's
      # vitest.config.ts — this step fails the build on regression.
      - run: pnpm -r --filter=./packages/* exec npx vitest run --coverage

  web:
    # Name kept verbatim — it's a required status check in the branch
    # protection rule on main; renaming it would make the rule unreachable.
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too would fail with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter=./packages/* build
      # Typecheck runs in the packages matrix; this job covers the Next.js build.
      - run: pnpm --filter @a2a-compliance/web build

  # Filesystem + config vulnerability scan with Trivy. Runs on every
  # push / PR so a new CVE in a transitive dep or a misconfigured
  # Dockerfile is caught before release. Findings upload as SARIF to
  # GitHub code-scanning when running on push; on forked PRs the
  # upload step is skipped (no write-perm on the fork's repo).
  trivy:
    name: trivy (fs + config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
          # Fail CI on CRITICAL/HIGH vulns that have a fix available.
          exit-code: '1'

      - name: Trivy — Dockerfile / compose config scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to code-scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload config SARIF to code-scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
