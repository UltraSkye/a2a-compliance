name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  packages:
    name: packages / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.11', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # Web typecheck folded into the main job so regressions fail fast
      # in the Node-matrix run rather than the separate web job.
      - run: pnpm --filter @a2a-compliance/web typecheck
      - run: pnpm build
      - run: pnpm test
      # Coverage thresholds per package are pinned in each package's
      # vitest.config.ts — this step fails the build on regression.
      - run: pnpm -r --filter=./packages/* exec npx vitest run --coverage

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter=./packages/* build
      - run: pnpm --filter @a2a-compliance/web typecheck
      - run: pnpm --filter @a2a-compliance/web build
