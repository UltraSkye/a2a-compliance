name: CodeQL

on:
  push:
    branches: [main]
  # CodeQL on every PR regardless of base branch; lets stacked PRs
  # (feat/v0.3-* targeting feat/v0.2, etc.) surface findings before
  # they bubble up to main.
  pull_request: {}
  schedule:
    # Weekly re-scan so newly-published CodeQL rules flag older code too.
    - cron: '17 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
