version: 2
updates:
  # npm deps across every workspace package
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      # Batch dev tooling into one PR to reduce review load
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "vitest"
          - "@types/*"
        update-types:
          - patch
          - minor
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions — keep workflow pins fresh
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci

  # One docker entry per Dockerfile so a base-image CVE opens a PR for each image.
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    commit-message:
      prefix: chore

  - package-ecosystem: docker
    directory: /packages/cli
    schedule:
      interval: monthly
    commit-message:
      prefix: chore

  - package-ecosystem: docker
    directory: /examples/reference-agent
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
