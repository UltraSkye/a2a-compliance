services:
  web:
    image: a2a-compliance-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${A2A_PORT:-3000}:3000"
    restart: unless-stopped
    # The dashboard is intentionally network-accessible — that's its job.
    # Operators exposing it to the public internet should read SECURITY.md
    # for the network-layer egress rules that close DNS-rebinding.

  # Mock agent fixtures — opt in with `docker compose --profile demo up`.
  # Not started by default. Each one serves a single agent card at the A2A
  # well-known path, intended for CLI testing. They bind to 127.0.0.1 only
  # so `docker compose --profile demo up` on a laptop doesn't silently
  # expose mock HTTP services to the local network.
  mock-good:
    profiles: [demo]
    image: nginx:alpine
    ports: ["127.0.0.1:${A2A_MOCK_GOOD_PORT:-8001}:80"]
    volumes:
      - ./examples/mock-agents/good:/usr/share/nginx/html:ro
    restart: unless-stopped

  mock-bad:
    profiles: [demo]
    image: nginx:alpine
    ports: ["127.0.0.1:${A2A_MOCK_BAD_PORT:-8002}:80"]
    volumes:
      - ./examples/mock-agents/bad:/usr/share/nginx/html:ro
    restart: unless-stopped

  mock-broken:
    profiles: [demo]
    image: nginx:alpine
    ports: ["127.0.0.1:${A2A_MOCK_BROKEN_PORT:-8003}:80"]
    volumes:
      - ./examples/mock-agents/broken:/usr/share/nginx/html:ro
    restart: unless-stopped

  # Known-compliant A2A agent — our own dogfood target. Serves both the
  # agent card and the JSON-RPC endpoint, so `a2a-compliance run` can
  # exercise the full probe chain and is expected to land in
  # FULL_FEATURED tier against this one.
  reference-agent:
    profiles: [demo]
    build:
      context: ./examples/reference-agent
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      PUBLIC_BASE: "http://localhost:${A2A_REF_PORT:-8004}"
    ports: ["127.0.0.1:${A2A_REF_PORT:-8004}:8080"]
    restart: unless-stopped
