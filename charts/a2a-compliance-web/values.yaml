# Default values for a2a-compliance-web.
# The chart is intentionally thin — one Deployment, one Service, an
# optional Ingress. Pull in the ghcr.io/ultraskye/a2a-compliance-web
# image (signed, multi-arch, SBOM-attested) and wire it into your
# cluster. No persistence, no secret volumes — the dashboard is
# stateless.

image:
  repository: ghcr.io/ultraskye/a2a-compliance-web
  tag: ""  # defaults to Chart.appVersion
  # Pin to an immutable digest in production for supply-chain
  # integrity (closes Trivy KSV-0125 trusted-registries alert). When
  # set, takes precedence over tag. Copy the digest from the
  # cosign-signed GHCR publication:
  #   cosign verify ghcr.io/ultraskye/a2a-compliance-web:<version> --certificate-identity-regexp '...'
  digest: ""
  pullPolicy: IfNotPresent

# Override for private registries / mirrored tags.
imagePullSecrets: []

replicas: 1

# SSRF-hostile agents hammering the probe can rack up egress cost; a
# tiny default so operators who forget to set limits don't surprise
# themselves. Bump when running at serious scale.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: a2a.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Apply to every Pod. The dashboard is stateless and reads no
# filesystem, so a read-only root FS + non-root user closes the
# blast radius if a downstream container exploit is found.
#
# UID/GID are deliberately above 10000 — under 10000 is treated by
# Trivy rules KSV-0020 / KSV-0021 as a potential collision with
# system users (node:alpine's "node" account sits at 1000). Using a
# high, unique uid also makes this pod easy to spot in an audit log.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# /tmp needs to be writable for Next.js's cache-control machinery.
extraVolumes:
  - name: tmp
    emptyDir: {}
extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

# Liveness + readiness probes hit the standalone Next.js server's
# root path — same as the Dockerfile HEALTHCHECK. No sidecar endpoint.
livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
